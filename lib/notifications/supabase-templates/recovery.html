<!--
  Crew Hub - Supabase Auth Email Template: Password Recovery
  ==========================================================
  Subject line: Reset your Crew Hub password

  HOW TO INSTALL
  1. Open your Supabase project dashboard.
  2. Go to Authentication → Email Templates → "Reset password".
  3. Set the Subject to:  Reset your Crew Hub password
  4. Paste the ENTIRE contents of this file into the Body (HTML) editor.
  5. Click Save.

  This template uses the Supabase Go template variable {{ .ConfirmationURL }}
  which Supabase replaces automatically at send-time.
-->
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="x-apple-disable-message-reformatting" />
  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no,url=no" />
  <title>Reset your Crew Hub password</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:AllowPNG/>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@500&display=swap');

    /* iOS blue link prevention */
    a[x-apple-data-detectors] {
      color: inherit !important;
      text-decoration: none !important;
      font-size: inherit !important;
      font-family: inherit !important;
      font-weight: inherit !important;
      line-height: inherit !important;
    }
    /* Gmail blue link prevention */
    u + #body a {
      color: inherit;
      text-decoration: none;
      font-size: inherit;
      font-family: inherit;
      font-weight: inherit;
      line-height: inherit;
    }
    /* Samsung Mail blue link prevention */
    #MessageViewBody a {
      color: inherit;
      text-decoration: none;
      font-size: inherit;
      font-family: inherit;
      font-weight: inherit;
      line-height: inherit;
    }
  </style>
</head>
<body id="body" style="margin:0;padding:0;word-spacing:normal;background-color:#FFFAF3;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
  <!-- Full-width wrapper -->
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#FFFAF3;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <!-- Content container -->
        <table role="presentation" width="560" cellspacing="0" cellpadding="0" border="0" style="max-width:560px;width:100%;">
          <!-- Brand mark -->
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <!--[if mso]>
              <table role="presentation" cellspacing="0" cellpadding="0" border="0"><tr><td style="width:36px;height:36px;background-color:#000000;border-radius:8px;text-align:center;vertical-align:middle;">
              <![endif]-->
              <div style="width:36px;height:36px;background-color:#000000;border-radius:8px;display:inline-block;text-align:center;line-height:36px;font-family:'Playfair Display',Georgia,serif;font-size:18px;font-weight:500;color:#FFFFFF;">C</div>
              <!--[if mso]>
              </td></tr></table>
              <![endif]-->
            </td>
          </tr>
          <!-- Main card -->
          <tr>
            <td>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#FFFFFF;border-radius:16px;border:1px solid rgba(26,43,60,0.06);box-shadow:0 1px 3px rgba(26,43,60,0.04),0 8px 24px rgba(26,43,60,0.03);">
                <!-- Orange accent bar -->
                <tr>
                  <td style="padding:0;font-size:0;line-height:0;">
                    <div style="height:3px;border-radius:16px 16px 0 0;background:linear-gradient(to right, #FD8B05 0%, #FD8B05 30%, transparent 100%);"></div>
                  </td>
                </tr>
                <!-- Card content -->
                <tr>
                  <td style="padding:36px 40px 40px 40px;">
                    <!-- Greeting -->
                    <h1 style="margin:0 0 20px 0;font-family:'Playfair Display',Georgia,serif;font-size:24px;font-weight:500;color:#1A2B3C;line-height:1.3;">Hey there,</h1>
                    <!-- Body text -->
                    <p style="margin:0 0 28px 0;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:15px;font-weight:400;color:#495057;line-height:1.65;">A password reset was requested for your Crew Hub account. Tap below to set a new password:</p>
                    <!-- CTA button -->
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                      <tr>
                        <td align="center" style="border-radius:10px;background-color:#FD8B05;">
                          <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 32px;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:15px;font-weight:600;color:#FFFFFF;text-decoration:none;border-radius:10px;background-color:#FD8B05;border:0;line-height:1;">Reset Password</a>
                        </td>
                      </tr>
                    </table>
                    <!-- Disclaimer -->
                    <p style="margin:28px 0 0 0;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:15px;font-weight:400;color:#495057;line-height:1.65;">If you didn't request this, you can safely ignore this email.</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Tagline below card -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:12px;font-weight:400;color:#C4CBCF;line-height:1.5;">Sent from Crew Hub, your team's home base.</p>
            </td>
          </tr>
          <!-- Divider -->
          <tr>
            <td style="padding-top:20px;">
              <div style="height:1px;background-color:rgba(232,223,208,0.6);"></div>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:20px;">
              <p style="margin:0;font-family:'DM Sans','Helvetica Neue',Arial,sans-serif;font-size:13px;font-weight:400;color:#A0AEBA;line-height:1.5;">&copy; Crew Hub. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
